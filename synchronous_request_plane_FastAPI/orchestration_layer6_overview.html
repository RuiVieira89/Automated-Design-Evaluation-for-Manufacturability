<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 6 — Orchestration</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border: rgba(0,0,0,0.12);
    --font-sans: system-ui, -apple-system, sans-serif;

    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-600: #993C1D; --coral-800: #712B13;
    --green-50: #EAF3DE; --green-100: #C0DD97; --green-600: #3B6D11; --green-800: #27500A;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-600: #5F5E5A; --gray-800: #444441;
    --t: rgba(0,0,0,0.3);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border: rgba(255,255,255,0.1);

      --teal-50: #04342C; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --purple-50: #26215C; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --coral-50: #4A1B0C; --coral-100: #712B13; --coral-600: #F0997B; --coral-800: #F5C4B3;
      --green-50: #173404; --green-100: #27500A; --green-600: #97C459; --green-800: #C0DD97;
      --gray-50: #2C2C2A; --gray-100: #444441; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
      --t: rgba(255,255,255,0.28);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }
  h2 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 32px;
  }
  .card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 760px;
  }
  svg text { font-family: var(--font-sans); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }

  .c-teal   rect { fill: var(--teal-50);   stroke: var(--teal-600);   }
  .c-teal   .th  { fill: var(--teal-800);  } .c-teal   .ts { fill: var(--teal-600);  }
  .c-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple .th  { fill: var(--purple-800);} .c-purple .ts { fill: var(--purple-600);}
  .c-coral  rect { fill: var(--coral-50);  stroke: var(--coral-600);  }
  .c-coral  .th  { fill: var(--coral-800); } .c-coral  .ts { fill: var(--coral-600); }
  .c-green  rect { fill: var(--green-50);  stroke: var(--green-600);  }
  .c-green  .th  { fill: var(--green-800); } .c-green  .ts { fill: var(--green-600); }
  .c-gray   rect { fill: var(--gray-50);   stroke: var(--gray-100);   }
  .c-gray   .th  { fill: var(--gray-800);  } .c-gray   .ts { fill: var(--gray-600);  }

  .node { cursor: default; }
  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--color-text-secondary);
    opacity: 0.6;
  }
</style>
</head>
<body>
<h1>CAD Pipeline</h1>
<h2>Layer 6 — Orchestration</h2>
<div class="card">
<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Callers -->
<g class="node c-gray">
  <rect x="40" y="20" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="42" text-anchor="middle" dominant-baseline="central">FreeCAD plugin</text>
</g>
<g class="node c-gray">
  <rect x="200" y="20" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="270" y="42" text-anchor="middle" dominant-baseline="central">Web UI</text>
</g>
<g class="node c-gray">
  <rect x="360" y="20" width="140" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="42" text-anchor="middle" dominant-baseline="central">CI/CD batch</text>
</g>
<g class="node c-gray">
  <rect x="520" y="20" width="120" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="580" y="42" text-anchor="middle" dominant-baseline="central">External API</text>
</g>

<!-- Sync plane: FastAPI -->
<g class="c-teal">
  <rect x="20" y="108" width="640" height="150" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="134" text-anchor="middle" dominant-baseline="central">Sync plane — FastAPI</text>
  <text class="ts" x="340" y="152" text-anchor="middle" dominant-baseline="central">request handling, validation, job dispatch</text>
</g>
<g class="node c-gray">
  <rect x="40" y="168" width="174" height="72" rx="6" stroke-width="0.5"/>
  <text class="th" x="127" y="192" text-anchor="middle" dominant-baseline="central">Endpoints</text>
  <text class="ts" x="127" y="212" text-anchor="middle" dominant-baseline="central">POST /analyse</text>
  <text class="ts" x="127" y="228" text-anchor="middle" dominant-baseline="central">GET /job/{id}</text>
</g>
<g class="node c-gray">
  <rect x="253" y="168" width="174" height="72" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="192" text-anchor="middle" dominant-baseline="central">Request validation</text>
  <text class="ts" x="340" y="212" text-anchor="middle" dominant-baseline="central">Pydantic schema</text>
  <text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central">file + process params</text>
</g>
<g class="node c-gray">
  <rect x="466" y="168" width="174" height="72" rx="6" stroke-width="0.5"/>
  <text class="th" x="553" y="192" text-anchor="middle" dominant-baseline="central">Job dispatch</text>
  <text class="ts" x="553" y="212" text-anchor="middle" dominant-baseline="central">celery.send_task()</text>
  <text class="ts" x="553" y="228" text-anchor="middle" dominant-baseline="central">returns job_id</text>
</g>

<!-- Callers → FastAPI -->
<line x1="110" y1="64" x2="110" y2="106" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="270" y1="64" x2="270" y2="106" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="430" y1="64" x2="430" y2="106" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="580" y1="64" x2="580" y2="106" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>

<!-- Redis -->
<g class="node c-coral">
  <rect x="240" y="302" width="200" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="322" text-anchor="middle" dominant-baseline="central">Redis</text>
  <text class="ts" x="340" y="340" text-anchor="middle" dominant-baseline="central">task broker + result store</text>
</g>

<!-- FastAPI dispatch → Redis -->
<line x1="553" y1="240" x2="400" y2="300" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>

<!-- Async plane: Celery -->
<g class="c-purple">
  <rect x="20" y="404" width="300" height="196" rx="14" stroke-width="0.5"/>
  <text class="th" x="170" y="430" text-anchor="middle" dominant-baseline="central">Async plane — Celery</text>
  <text class="ts" x="170" y="448" text-anchor="middle" dominant-baseline="central">worker pool, per-job tasks</text>
</g>
<g class="node c-gray">
  <rect x="38" y="462" width="130" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="103" y="482" text-anchor="middle" dominant-baseline="central">analyse_part</text>
  <text class="ts" x="103" y="500" text-anchor="middle" dominant-baseline="central">L1–L5 pipeline call</text>
</g>
<g class="node c-gray">
  <rect x="186" y="462" width="120" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="246" y="482" text-anchor="middle" dominant-baseline="central">fan_out</text>
  <text class="ts" x="246" y="500" text-anchor="middle" dominant-baseline="central">chord per component</text>
</g>
<g class="node c-gray">
  <rect x="38" y="530" width="130" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="103" y="550" text-anchor="middle" dominant-baseline="central">aggregate</text>
  <text class="ts" x="103" y="568" text-anchor="middle" dominant-baseline="central">chord callback</text>
</g>
<g class="node c-gray">
  <rect x="186" y="530" width="120" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="246" y="550" text-anchor="middle" dominant-baseline="central">retry / DLQ</text>
  <text class="ts" x="246" y="568" text-anchor="middle" dominant-baseline="central">max_retries, on_failure</text>
</g>

<!-- Batch orchestrator: Prefect / Airflow -->
<g class="c-purple">
  <rect x="360" y="404" width="300" height="196" rx="14" stroke-width="0.5"/>
  <text class="th" x="510" y="430" text-anchor="middle" dominant-baseline="central">Batch orchestrator</text>
  <text class="ts" x="510" y="448" text-anchor="middle" dominant-baseline="central">Prefect or Airflow</text>
</g>
<g class="node c-gray">
  <rect x="378" y="462" width="130" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="443" y="482" text-anchor="middle" dominant-baseline="central">Assembly flow</text>
  <text class="ts" x="443" y="500" text-anchor="middle" dominant-baseline="central">DAG per assembly</text>
</g>
<g class="node c-gray">
  <rect x="526" y="462" width="120" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="586" y="482" text-anchor="middle" dominant-baseline="central">Task scheduler</text>
  <text class="ts" x="586" y="500" text-anchor="middle" dominant-baseline="central">triggers Celery tasks</text>
</g>
<g class="node c-gray">
  <rect x="378" y="530" width="130" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="443" y="550" text-anchor="middle" dominant-baseline="central">Run schedule</text>
  <text class="ts" x="443" y="568" text-anchor="middle" dominant-baseline="central">cron / commit hook</text>
</g>
<g class="node c-gray">
  <rect x="526" y="530" width="120" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="586" y="550" text-anchor="middle" dominant-baseline="central">Run history</text>
  <text class="ts" x="586" y="568" text-anchor="middle" dominant-baseline="central">logs, retries, UI</text>
</g>

<!-- Redis → Celery and orchestrator -->
<line x1="310" y1="354" x2="200" y2="402" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="370" y1="354" x2="480" y2="402" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>

<!-- Orchestrator → Celery -->
<path d="M360 510 L322 510" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.45" marker-end="url(#arrow)"/>

<!-- Results back to FastAPI -->
<path d="M170 530 L170 610 L640 610 L640 200 L642 200" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.3" marker-end="url(#arrow)"/>

<!-- Layer 5 handoff -->
<g class="node c-green">
  <rect x="200" y="626" width="280" height="28" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="641" text-anchor="middle" dominant-baseline="central">→ Layer 5 (results to viz / feedback)</text>
</g>
<line x1="170" y1="600" x2="270" y2="624" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="510" y1="600" x2="410" y2="624" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
</svg>
</div>
<footer>Layer 6 — Orchestration · CAD Pipeline</footer>
</body>
</html>
