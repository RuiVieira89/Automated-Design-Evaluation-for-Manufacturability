<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 6 — Job Lifecycle</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border: rgba(0,0,0,0.12);
    --font-sans: system-ui, -apple-system, sans-serif;

    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-600: #993C1D; --coral-800: #712B13;
    --green-50: #EAF3DE; --green-100: #C0DD97; --green-600: #3B6D11; --green-800: #27500A;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B; --amber-800: #633806;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-600: #5F5E5A; --gray-800: #444441;
    --t: rgba(0,0,0,0.3);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border: rgba(255,255,255,0.1);

      --teal-50: #04342C; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --purple-50: #26215C; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --coral-50: #4A1B0C; --coral-100: #712B13; --coral-600: #F0997B; --coral-800: #F5C4B3;
      --green-50: #173404; --green-100: #27500A; --green-600: #97C459; --green-800: #C0DD97;
      --amber-50: #412402; --amber-100: #633806; --amber-600: #EF9F27; --amber-800: #FAC775;
      --gray-50: #2C2C2A; --gray-100: #444441; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
      --t: rgba(255,255,255,0.28);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }
  h2 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 32px;
  }
  .card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 760px;
  }
  svg text { font-family: var(--font-sans); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }

  .c-teal   rect { fill: var(--teal-50);   stroke: var(--teal-600);   }
  .c-teal   .th  { fill: var(--teal-800);  } .c-teal   .ts { fill: var(--teal-600);  }
  .c-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple .th  { fill: var(--purple-800);} .c-purple .ts { fill: var(--purple-600);}
  .c-coral  rect { fill: var(--coral-50);  stroke: var(--coral-600);  }
  .c-coral  .th  { fill: var(--coral-800); } .c-coral  .ts { fill: var(--coral-600); }
  .c-green  rect { fill: var(--green-50);  stroke: var(--green-600);  }
  .c-green  .th  { fill: var(--green-800); } .c-green  .ts { fill: var(--green-600); }
  .c-amber  rect { fill: var(--amber-50);  stroke: var(--amber-600);  }
  .c-amber  .th  { fill: var(--amber-800); } .c-amber  .ts { fill: var(--amber-600); }
  .c-gray   rect { fill: var(--gray-50);   stroke: var(--gray-100);   }
  .c-gray   .th  { fill: var(--gray-800);  } .c-gray   .ts { fill: var(--gray-600);  }

  .node { cursor: default; }
  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--color-text-secondary);
    opacity: 0.6;
  }
</style>
</head>
<body>
<h1>CAD Pipeline · Layer 6 — Orchestration</h1>
<h2>Job lifecycle</h2>
<div class="card">
<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Step 1: Receive -->
<g class="node c-teal">
  <rect x="35" y="60" width="90" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="80" y="84" text-anchor="middle" dominant-baseline="central">Receive</text>
  <text class="ts" x="80" y="104" text-anchor="middle" dominant-baseline="central">validate + store</text>
</g>

<!-- Step 2: Enqueue -->
<g class="node c-teal">
  <rect x="139" y="60" width="90" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="184" y="84" text-anchor="middle" dominant-baseline="central">Enqueue</text>
  <text class="ts" x="184" y="104" text-anchor="middle" dominant-baseline="central">job_id → client</text>
</g>

<!-- Step 3: Pick up -->
<g class="node c-purple">
  <rect x="243" y="60" width="90" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="288" y="84" text-anchor="middle" dominant-baseline="central">Pick up</text>
  <text class="ts" x="288" y="104" text-anchor="middle" dominant-baseline="central">worker claims task</text>
</g>

<!-- Step 4: Execute -->
<g class="node c-purple">
  <rect x="347" y="60" width="90" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="392" y="84" text-anchor="middle" dominant-baseline="central">Execute</text>
  <text class="ts" x="392" y="104" text-anchor="middle" dominant-baseline="central">L1 → L5 pipeline</text>
</g>

<!-- Step 5: Store result -->
<g class="node c-coral">
  <rect x="451" y="60" width="90" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="496" y="84" text-anchor="middle" dominant-baseline="central">Store result</text>
  <text class="ts" x="496" y="104" text-anchor="middle" dominant-baseline="central">Redis backend</text>
</g>

<!-- Step 6: Deliver -->
<g class="node c-green">
  <rect x="555" y="60" width="90" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="600" y="84" text-anchor="middle" dominant-baseline="central">Deliver</text>
  <text class="ts" x="600" y="104" text-anchor="middle" dominant-baseline="central">poll → response</text>
</g>

<!-- Step arrows -->
<line x1="125" y1="92" x2="137" y2="92" stroke="var(--t)" stroke-width="1" opacity="0.5" marker-end="url(#arrow)" fill="none"/>
<line x1="229" y1="92" x2="241" y2="92" stroke="var(--t)" stroke-width="1" opacity="0.5" marker-end="url(#arrow)" fill="none"/>
<line x1="333" y1="92" x2="345" y2="92" stroke="var(--t)" stroke-width="1" opacity="0.5" marker-end="url(#arrow)" fill="none"/>
<line x1="437" y1="92" x2="449" y2="92" stroke="var(--t)" stroke-width="1" opacity="0.5" marker-end="url(#arrow)" fill="none"/>
<line x1="541" y1="92" x2="553" y2="92" stroke="var(--t)" stroke-width="1" opacity="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- Role swimlane labels -->
<rect x="32" y="146" width="246" height="22" rx="4" stroke="var(--t)" stroke-width="0.5" fill="none" opacity="0.2"/>
<text class="ts" x="155" y="161" text-anchor="middle" opacity="0.45">FastAPI</text>
<rect x="240" y="146" width="208" height="22" rx="4" stroke="var(--t)" stroke-width="0.5" fill="none" opacity="0.2"/>
<text class="ts" x="344" y="161" text-anchor="middle" opacity="0.45">Celery worker</text>
<rect x="448" y="146" width="96" height="22" rx="4" stroke="var(--t)" stroke-width="0.5" fill="none" opacity="0.2"/>
<text class="ts" x="496" y="161" text-anchor="middle" opacity="0.45">Redis</text>
<rect x="552" y="146" width="96" height="22" rx="4" stroke="var(--t)" stroke-width="0.5" fill="none" opacity="0.2"/>
<text class="ts" x="600" y="161" text-anchor="middle" opacity="0.45">FastAPI</text>

<!-- State machine -->
<g class="node c-gray">
  <rect x="35" y="210" width="100" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="85" y="228" text-anchor="middle" dominant-baseline="central">PENDING</text>
</g>
<g class="node c-amber">
  <rect x="165" y="210" width="100" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="215" y="228" text-anchor="middle" dominant-baseline="central">RUNNING</text>
</g>
<g class="node c-green">
  <rect x="295" y="210" width="100" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="345" y="228" text-anchor="middle" dominant-baseline="central">SUCCESS</text>
</g>
<g class="node c-coral">
  <rect x="425" y="210" width="100" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="475" y="228" text-anchor="middle" dominant-baseline="central">FAILURE</text>
</g>
<g class="node c-gray">
  <rect x="555" y="210" width="100" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="605" y="228" text-anchor="middle" dominant-baseline="central">RETRY</text>
</g>

<!-- State transitions -->
<line x1="135" y1="228" x2="163" y2="228" stroke="var(--t)" stroke-width="1" opacity="0.45" marker-end="url(#arrow)" fill="none"/>
<line x1="265" y1="228" x2="293" y2="228" stroke="var(--t)" stroke-width="1" opacity="0.45" marker-end="url(#arrow)" fill="none"/>
<line x1="395" y1="228" x2="423" y2="228" stroke="var(--t)" stroke-width="1" opacity="0.45" marker-end="url(#arrow)" fill="none"/>
<path d="M475 246 Q475 280 605 280 L605 248" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.4" marker-end="url(#arrow)"/>
<text class="ts" x="545" y="295" text-anchor="middle" opacity="0.5">↻ retry → PENDING</text>

<!-- Pattern boxes -->
<g class="node c-purple">
  <rect x="35" y="330" width="200" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="135" y="350" text-anchor="middle" dominant-baseline="central">Assembly fan-out</text>
  <text class="ts" x="135" y="368" text-anchor="middle" dominant-baseline="central">chord(analyse_part × N) | aggregate</text>
</g>
<g class="node c-purple">
  <rect x="255" y="330" width="200" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="355" y="350" text-anchor="middle" dominant-baseline="central">Prefect flow wrapper</text>
  <text class="ts" x="355" y="368" text-anchor="middle" dominant-baseline="central">task deps, caching, retries</text>
</g>
<g class="node c-teal">
  <rect x="475" y="330" width="170" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="350" text-anchor="middle" dominant-baseline="central">Observability</text>
  <text class="ts" x="560" y="368" text-anchor="middle" dominant-baseline="central">Flower, Prefect UI, logs</text>
</g>
</svg>
</div>
<footer>Layer 6 — Job lifecycle · CAD Pipeline</footer>
</body>
</html>
