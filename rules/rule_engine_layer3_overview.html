<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 3 — Rule Engine</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border: rgba(0,0,0,0.12);
    --font-sans: system-ui, -apple-system, sans-serif;

    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-600: #0F6E56; --teal-800: #085041;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B; --amber-800: #633806;
    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-600: #185FA5; --blue-800: #0C447C;
    --green-50: #EAF3DE; --green-100: #C0DD97; --green-600: #3B6D11; --green-800: #27500A;
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-600: #993C1D; --coral-800: #712B13;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-600: #5F5E5A; --gray-800: #444441;
    --t: rgba(0,0,0,0.3);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border: rgba(255,255,255,0.1);

      --teal-50: #04342C; --teal-100: #085041; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --purple-50: #26215C; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --amber-50: #412402; --amber-100: #633806; --amber-600: #EF9F27; --amber-800: #FAC775;
      --blue-50: #042C53; --blue-100: #0C447C; --blue-600: #85B7EB; --blue-800: #B5D4F4;
      --green-50: #173404; --green-100: #27500A; --green-600: #97C459; --green-800: #C0DD97;
      --coral-50: #4A1B0C; --coral-100: #712B13; --coral-600: #F0997B; --coral-800: #F5C4B3;
      --gray-50: #2C2C2A; --gray-100: #444441; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
      --t: rgba(255,255,255,0.28);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }
  h2 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 32px;
  }
  .card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 760px;
  }
  svg text { font-family: var(--font-sans); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }

  .c-teal   rect, .c-teal   circle { fill: var(--teal-50);   stroke: var(--teal-600);   }
  .c-teal   .th { fill: var(--teal-800);   } .c-teal   .ts { fill: var(--teal-600);   }
  .c-purple rect, .c-purple circle { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple .th { fill: var(--purple-800); } .c-purple .ts { fill: var(--purple-600); }
  .c-amber  rect, .c-amber  circle { fill: var(--amber-50);  stroke: var(--amber-600);  }
  .c-amber  .th { fill: var(--amber-800);  } .c-amber  .ts { fill: var(--amber-600);  }
  .c-blue   rect, .c-blue   circle { fill: var(--blue-50);   stroke: var(--blue-600);   }
  .c-blue   .th { fill: var(--blue-800);   } .c-blue   .ts { fill: var(--blue-600);   }
  .c-green  rect, .c-green  circle { fill: var(--green-50);  stroke: var(--green-600);  }
  .c-green  .th { fill: var(--green-800);  } .c-green  .ts { fill: var(--green-600);  }
  .c-coral  rect, .c-coral  circle { fill: var(--coral-50);  stroke: var(--coral-600);  }
  .c-coral  .th { fill: var(--coral-800);  } .c-coral  .ts { fill: var(--coral-600);  }
  .c-gray   rect, .c-gray   circle { fill: var(--gray-50);   stroke: var(--gray-100);   }
  .c-gray   .th { fill: var(--gray-800);   } .c-gray   .ts { fill: var(--gray-600);   }

  .node { cursor: default; }
  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--color-text-secondary);
    opacity: 0.6;
  }
</style>
</head>
<body>
<h1>CAD Pipeline</h1>
<h2>Layer 3 — Rule Engine</h2>
<div class="card">
<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 2 inputs -->
<g class="node c-blue">
  <rect x="40" y="20" width="180" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="130" y="40" text-anchor="middle" dominant-baseline="central">B-Rep results</text>
  <text class="ts" x="130" y="58" text-anchor="middle" dominant-baseline="central">topology, curvature, draft</text>
</g>
<g class="node c-blue">
  <rect x="460" y="20" width="180" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="40" text-anchor="middle" dominant-baseline="central">Mesh results</text>
  <text class="ts" x="550" y="58" text-anchor="middle" dominant-baseline="central">thickness, features, repair</text>
</g>
<text class="ts" x="340" y="44" text-anchor="middle" dominant-baseline="central" opacity="0.4">Layer 2 ↓</text>

<!-- Container A: DfX Rule Modules -->
<g class="c-teal">
  <rect x="20" y="100" width="210" height="310" rx="14" stroke-width="0.5"/>
  <text class="th" x="125" y="126" text-anchor="middle" dominant-baseline="central">DfX rule modules</text>
  <text class="ts" x="125" y="144" text-anchor="middle" dominant-baseline="central">Python + OCC/CGAL calls</text>
</g>
<g class="node c-gray">
  <rect x="38" y="162" width="174" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="125" y="178" text-anchor="middle" dominant-baseline="central">Min wall thickness</text>
  <text class="ts" x="125" y="194" text-anchor="middle" dominant-baseline="central">ray cast + CGAL offset</text>
</g>
<g class="node c-gray">
  <rect x="38" y="210" width="174" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="125" y="226" text-anchor="middle" dominant-baseline="central">Draft angles</text>
  <text class="ts" x="125" y="242" text-anchor="middle" dominant-baseline="central">face normals vs pull dir</text>
</g>
<g class="node c-gray">
  <rect x="38" y="258" width="174" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="125" y="274" text-anchor="middle" dominant-baseline="central">Undercut detection</text>
  <text class="ts" x="125" y="290" text-anchor="middle" dominant-baseline="central">silhouette + ray test</text>
</g>
<g class="node c-gray">
  <rect x="38" y="306" width="174" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="125" y="322" text-anchor="middle" dominant-baseline="central">Hole depth / dia ratio</text>
  <text class="ts" x="125" y="338" text-anchor="middle" dominant-baseline="central">cylindrical face query</text>
</g>
<g class="node c-gray">
  <rect x="38" y="354" width="174" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="125" y="370" text-anchor="middle" dominant-baseline="central">Tool access cones</text>
  <text class="ts" x="125" y="386" text-anchor="middle" dominant-baseline="central">visibility + clearance</text>
</g>

<!-- Container B: Dependency graph -->
<g class="c-purple">
  <rect x="248" y="100" width="184" height="180" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="126" text-anchor="middle" dominant-baseline="central">Dependency graph</text>
  <text class="ts" x="340" y="144" text-anchor="middle" dominant-baseline="central">networkx DAG</text>
</g>
<g class="node c-gray">
  <rect x="264" y="162" width="152" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="180" text-anchor="middle" dominant-baseline="central">Feature nodes</text>
</g>
<g class="node c-gray">
  <rect x="264" y="206" width="152" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="224" text-anchor="middle" dominant-baseline="central">Dependency edges</text>
</g>
<g class="node c-gray">
  <rect x="264" y="250" width="152" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="340" y="268" text-anchor="middle" dominant-baseline="central">Topo sort → check order</text>
</g>

<!-- Container C: Tolerance solver -->
<g class="c-amber">
  <rect x="450" y="100" width="210" height="180" rx="14" stroke-width="0.5"/>
  <text class="th" x="555" y="126" text-anchor="middle" dominant-baseline="central">Tolerance solver</text>
  <text class="ts" x="555" y="144" text-anchor="middle" dominant-baseline="central">scipy.optimize</text>
</g>
<g class="node c-gray">
  <rect x="466" y="162" width="178" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="180" text-anchor="middle" dominant-baseline="central">Constraint functions</text>
</g>
<g class="node c-gray">
  <rect x="466" y="206" width="178" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="224" text-anchor="middle" dominant-baseline="central">Objective: worst-case gap</text>
</g>
<g class="node c-gray">
  <rect x="466" y="250" width="178" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="268" text-anchor="middle" dominant-baseline="central">Feasibility verdict</text>
</g>

<!-- Input → subsystem arrows -->
<line x1="130" y1="68" x2="125" y2="98" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="180" y1="44" x2="290" y2="98" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="550" y1="68" x2="555" y2="98" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="500" y1="44" x2="390" y2="98" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>

<!-- Cross-subsystem interactions -->
<path d="M248 200 L232 200" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="240" y="193" text-anchor="middle" opacity="0.55">check order</text>
<path d="M230 340 Q340 440 448 280" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.4" marker-end="url(#arrow)"/>
<text class="ts" x="342" y="452" text-anchor="middle" opacity="0.5">violation data → constraints</text>
<path d="M432 200 L448 200" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="440" y="193" text-anchor="middle" opacity="0.55">assembly ctx</text>

<!-- Result aggregator -->
<g class="node c-green">
  <rect x="160" y="490" width="360" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="511" text-anchor="middle" dominant-baseline="central">Result aggregator</text>
  <text class="ts" x="340" y="529" text-anchor="middle" dominant-baseline="central">pass / warn / fail per check + severity</text>
</g>

<!-- Subsystems → aggregator -->
<line x1="125" y1="412" x2="210" y2="488" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="340" y1="282" x2="340" y2="488" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="555" y1="282" x2="470" y2="488" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>

<!-- Layer 4 handoff -->
<g class="node c-coral">
  <rect x="160" y="574" width="360" height="30" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="590" text-anchor="middle" dominant-baseline="central">→ Layer 4 (reporting / feedback / ML features)</text>
</g>
<line x1="340" y1="542" x2="340" y2="572" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
</svg>
</div>
<footer>Layer 3 — Rule Engine · CAD Pipeline</footer>
</body>
</html>
