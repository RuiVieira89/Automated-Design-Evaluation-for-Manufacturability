<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 3 — Rule Module Anatomy</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border: rgba(0,0,0,0.12);
    --font-sans: system-ui, -apple-system, sans-serif;

    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-600: #0F6E56; --teal-800: #085041;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B; --amber-800: #633806;
    --green-50: #EAF3DE; --green-100: #C0DD97; --green-600: #3B6D11; --green-800: #27500A;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-600: #5F5E5A; --gray-800: #444441;
    --t: rgba(0,0,0,0.3);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border: rgba(255,255,255,0.1);

      --teal-50: #04342C; --teal-100: #085041; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --purple-50: #26215C; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --amber-50: #412402; --amber-100: #633806; --amber-600: #EF9F27; --amber-800: #FAC775;
      --green-50: #173404; --green-100: #27500A; --green-600: #97C459; --green-800: #C0DD97;
      --gray-50: #2C2C2A; --gray-100: #444441; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
      --t: rgba(255,255,255,0.28);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }
  h2 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 32px;
  }
  .card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 760px;
  }
  svg text { font-family: var(--font-sans); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }

  .c-teal   rect { fill: var(--teal-50);   stroke: var(--teal-600);   }
  .c-teal   .th  { fill: var(--teal-800);  } .c-teal  .ts { fill: var(--teal-600);   }
  .c-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple .th  { fill: var(--purple-800);} .c-purple .ts { fill: var(--purple-600); }
  .c-amber  rect { fill: var(--amber-50);  stroke: var(--amber-600);  }
  .c-amber  .th  { fill: var(--amber-800); } .c-amber  .ts { fill: var(--amber-600);  }
  .c-green  rect { fill: var(--green-50);  stroke: var(--green-600);  }
  .c-green  .th  { fill: var(--green-800); } .c-green  .ts { fill: var(--green-600);  }
  .c-gray   rect { fill: var(--gray-50);   stroke: var(--gray-100);   }
  .c-gray   .th  { fill: var(--gray-800);  } .c-gray   .ts { fill: var(--gray-600);   }

  .node { cursor: default; }
  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--color-text-secondary);
    opacity: 0.6;
  }
</style>
</head>
<body>
<h1>CAD Pipeline · Layer 3 — Rule Engine</h1>
<h2>Rule module anatomy</h2>
<div class="card">
<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Base class container -->
<g class="c-teal">
  <rect x="30" y="20" width="200" height="200" rx="14" stroke-width="0.5"/>
  <text class="th" x="130" y="48" text-anchor="middle" dominant-baseline="central">DfxCheck (base)</text>
  <text class="ts" x="130" y="66" text-anchor="middle" dominant-baseline="central">abstract interface</text>
</g>
<g class="node c-gray">
  <rect x="46" y="84" width="168" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="130" y="102" text-anchor="middle" dominant-baseline="central">run(shape, params) → result</text>
</g>
<g class="node c-gray">
  <rect x="46" y="128" width="168" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="130" y="146" text-anchor="middle" dominant-baseline="central">CheckResult dataclass</text>
</g>
<g class="node c-gray">
  <rect x="46" y="172" width="168" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="130" y="190" text-anchor="middle" dominant-baseline="central">severity: pass/warn/fail</text>
</g>

<!-- Concrete: WallThicknessCheck -->
<g class="node c-purple">
  <rect x="270" y="20" width="180" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="360" y="48" text-anchor="middle" dominant-baseline="central">WallThicknessCheck</text>
  <text class="ts" x="360" y="66" text-anchor="middle" dominant-baseline="central">trimesh rays + min thresh</text>
  <text class="ts" x="360" y="82" text-anchor="middle" dominant-baseline="central">→ worst-case thickness</text>
</g>

<!-- Concrete: DraftAngleCheck -->
<g class="node c-purple">
  <rect x="270" y="118" width="180" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="360" y="146" text-anchor="middle" dominant-baseline="central">DraftAngleCheck</text>
  <text class="ts" x="360" y="164" text-anchor="middle" dominant-baseline="central">OCCT BRep_Tool + normals</text>
  <text class="ts" x="360" y="180" text-anchor="middle" dominant-baseline="central">→ min angle per face</text>
</g>

<!-- Concrete: HoleRatioCheck -->
<g class="node c-purple">
  <rect x="270" y="216" width="180" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="360" y="244" text-anchor="middle" dominant-baseline="central">HoleRatioCheck</text>
  <text class="ts" x="360" y="262" text-anchor="middle" dominant-baseline="central">OCCT cylindrical topology</text>
  <text class="ts" x="360" y="278" text-anchor="middle" dominant-baseline="central">→ depth : dia verdict</text>
</g>

<!-- Inheritance arrows: base → concrete -->
<line x1="230" y1="102" x2="268" y2="62"  stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="230" y1="146" x2="268" y2="158" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>
<line x1="230" y1="190" x2="268" y2="252" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)" fill="none"/>

<!-- Rule registry -->
<g class="node c-amber">
  <rect x="490" y="80" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="570" y="102" text-anchor="middle" dominant-baseline="central">Rule registry</text>
  <text class="ts" x="570" y="120" text-anchor="middle" dominant-baseline="central">name → class mapping</text>
</g>

<!-- Param store -->
<g class="node c-amber">
  <rect x="490" y="154" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="570" y="176" text-anchor="middle" dominant-baseline="central">Param store</text>
  <text class="ts" x="570" y="194" text-anchor="middle" dominant-baseline="central">thresholds, tolerances</text>
</g>

<!-- Concrete → registry/params -->
<line x1="450" y1="62"  x2="488" y2="96"  stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="450" y1="158" x2="488" y2="158" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="450" y1="252" x2="488" y2="185" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>

<!-- Param store → concrete (params flow in) -->
<path d="M570 154 Q570 52 452 52" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.35" marker-end="url(#arrow)"/>
<text class="ts" x="530" y="38" text-anchor="middle" opacity="0.5">injects params</text>

<!-- Collected results -->
<g class="node c-green">
  <rect x="490" y="240" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="570" y="262" text-anchor="middle" dominant-baseline="central">Collected results</text>
  <text class="ts" x="570" y="280" text-anchor="middle" dominant-baseline="central">list[CheckResult]</text>
</g>
<line x1="450" y1="296" x2="488" y2="268" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="450" y1="160" x2="488" y2="255" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="450" y1="62"  x2="570" y2="238" stroke="var(--t)" stroke-width="1" opacity="0.3"  marker-end="url(#arrow)" fill="none"/>
</svg>
</div>
<footer>Layer 3 — Rule Engine · Rule module anatomy · CAD Pipeline</footer>
</body>
</html>
