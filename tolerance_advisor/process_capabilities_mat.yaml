# Process capability database — material-specific parameters.
# Human-editable YAML — add or extend process entries here.
#
# Schema
# ------
# Each process entry has process-level keys (typical_it_grade, iso_it_grades,
# min_feature_size_mm) and a `materials` mapping.  Under each material key,
# `surface_roughness_ra_um` and `dimensional_range_mm` reflect the achievable
# values specifically for that material–process combination.

