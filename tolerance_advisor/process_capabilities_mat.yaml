  typical_it_grade: "IT8"
  iso_it_grades: ["IT6", "IT7", "IT8", "IT9"]
  min_feature_size_mm: 0.5
  materials:
    steel:
      surface_roughness_ra_um: [0.8, 1.6, 3.2]
      dimensional_range_mm: [1, 500]
