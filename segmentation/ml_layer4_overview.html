<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 4 — ML / Context-Aware Reasoning</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border: rgba(0,0,0,0.12);
    --font-sans: system-ui, -apple-system, sans-serif;

    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --coral-50:  #FAECE7; --coral-100:  #F5C4B3; --coral-600:  #993C1D; --coral-800:  #712B13;
    --green-50:  #EAF3DE; --green-100:  #C0DD97; --green-600:  #3B6D11; --green-800:  #27500A;
    --amber-50:  #FAEEDA; --amber-100:  #FAC775; --amber-600:  #854F0B; --amber-800:  #633806;
    --teal-50:   #E1F5EE; --teal-100:   #9FE1CB; --teal-600:   #0F6E56; --teal-800:   #085041;
    --gray-50:   #F1EFE8; --gray-100:   #D3D1C7; --gray-600:   #5F5E5A; --gray-800:   #444441;
    --t: rgba(0,0,0,0.3);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border: rgba(255,255,255,0.1);

      --purple-50: #26215C; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --coral-50:  #4A1B0C; --coral-100:  #712B13; --coral-600:  #F0997B; --coral-800:  #F5C4B3;
      --green-50:  #173404; --green-100:  #27500A; --green-600:  #97C459; --green-800:  #C0DD97;
      --amber-50:  #412402; --amber-100:  #633806; --amber-600:  #EF9F27; --amber-800:  #FAC775;
      --teal-50:   #04342C; --teal-100:   #085041; --teal-600:   #5DCAA5; --teal-800:   #9FE1CB;
      --gray-50:   #2C2C2A; --gray-100:   #444441; --gray-600:   #B4B2A9; --gray-800:   #D3D1C7;
      --t: rgba(255,255,255,0.28);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }
  h2 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 32px;
  }
  .card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 760px;
  }
  svg text { font-family: var(--font-sans); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }

  .c-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple .th  { fill: var(--purple-800); } .c-purple .ts { fill: var(--purple-600); }
  .c-coral  rect { fill: var(--coral-50);  stroke: var(--coral-600);  }
  .c-coral  .th  { fill: var(--coral-800);  } .c-coral  .ts { fill: var(--coral-600);  }
  .c-green  rect { fill: var(--green-50);  stroke: var(--green-600);  }
  .c-green  .th  { fill: var(--green-800);  } .c-green  .ts { fill: var(--green-600);  }
  .c-amber  rect { fill: var(--amber-50);  stroke: var(--amber-600);  }
  .c-amber  .th  { fill: var(--amber-800);  } .c-amber  .ts { fill: var(--amber-600);  }
  .c-teal   rect { fill: var(--teal-50);   stroke: var(--teal-600);   }
  .c-teal   .th  { fill: var(--teal-800);   } .c-teal   .ts { fill: var(--teal-600);   }
  .c-gray   rect { fill: var(--gray-50);   stroke: var(--gray-100);   }
  .c-gray   .th  { fill: var(--gray-800);   } .c-gray   .ts { fill: var(--gray-600);   }

  .node { cursor: default; }
  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--color-text-secondary);
    opacity: 0.6;
  }
</style>
</head>
<body>
<h1>CAD Pipeline</h1>
<h2>Layer 4 — ML / Context-Aware Reasoning</h2>
<div class="card">
<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 3 input -->
<g class="node c-green">
  <rect x="180" y="20" width="320" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Layer 3 results</text>
  <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">CheckResult list + feature vectors</text>
</g>

<text class="ts" x="340" y="96" text-anchor="middle" dominant-baseline="central" opacity="0.4">splits by use</text>
<line x1="340" y1="68" x2="340" y2="106" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<path d="M340 106 L160 126" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.35"/>
<path d="M340 106 L520 126" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.35"/>

<!-- Training path container -->
<g class="c-purple">
  <rect x="30" y="126" width="260" height="310" rx="14" stroke-width="0.5"/>
  <text class="th" x="160" y="152" text-anchor="middle" dominant-baseline="central">Training path</text>
  <text class="ts" x="160" y="170" text-anchor="middle" dominant-baseline="central">offline, GPU, PyTorch</text>
</g>

<g class="node c-gray">
  <rect x="48" y="188" width="224" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="160" y="208" text-anchor="middle" dominant-baseline="central">PyTorch Geometric</text>
  <text class="ts" x="160" y="228" text-anchor="middle" dominant-baseline="central">GNN on B-Rep feature graph</text>
</g>
<g class="node c-gray">
  <rect x="48" y="256" width="224" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="160" y="276" text-anchor="middle" dominant-baseline="central">PointNet++</text>
  <text class="ts" x="160" y="296" text-anchor="middle" dominant-baseline="central">point cloud feature recognition</text>
</g>
<g class="node c-gray">
  <rect x="48" y="324" width="224" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="160" y="340" text-anchor="middle" dominant-baseline="central">torch.onnx.export</text>
  <text class="ts" x="160" y="356" text-anchor="middle" dominant-baseline="central">→ .onnx artefact</text>
</g>
<g class="node c-gray">
  <rect x="48" y="380" width="224" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="160" y="396" text-anchor="middle" dominant-baseline="central">Model registry</text>
  <text class="ts" x="160" y="412" text-anchor="middle" dominant-baseline="central">versioned .onnx store</text>
</g>

<line x1="160" y1="244" x2="160" y2="254" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="160" y1="312" x2="160" y2="322" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="160" y1="368" x2="160" y2="378" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>

<!-- Inference path container -->
<g class="c-coral">
  <rect x="390" y="126" width="260" height="310" rx="14" stroke-width="0.5"/>
  <text class="th" x="520" y="152" text-anchor="middle" dominant-baseline="central">Inference path</text>
  <text class="ts" x="520" y="170" text-anchor="middle" dominant-baseline="central">online, CPU/GPU, ONNX RT</text>
</g>

<g class="node c-gray">
  <rect x="408" y="188" width="224" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="520" y="208" text-anchor="middle" dominant-baseline="central">ONNX Runtime</text>
  <text class="ts" x="520" y="228" text-anchor="middle" dominant-baseline="central">framework-free execution</text>
</g>
<g class="node c-gray">
  <rect x="408" y="256" width="224" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="520" y="276" text-anchor="middle" dominant-baseline="central">Process classifier</text>
  <text class="ts" x="520" y="296" text-anchor="middle" dominant-baseline="central">3-axis / 5-axis / casting / etc.</text>
</g>
<g class="node c-gray">
  <rect x="408" y="324" width="224" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="520" y="340" text-anchor="middle" dominant-baseline="central">Confidence scores</text>
  <text class="ts" x="520" y="356" text-anchor="middle" dominant-baseline="central">per-feature, per-process</text>
</g>
<g class="node c-gray">
  <rect x="408" y="380" width="224" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="520" y="396" text-anchor="middle" dominant-baseline="central">Rule fallback</text>
  <text class="ts" x="520" y="412" text-anchor="middle" dominant-baseline="central">low-conf → L3 deterministic</text>
</g>

<line x1="520" y1="244" x2="520" y2="254" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="520" y1="312" x2="520" y2="322" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="520" y1="368" x2="520" y2="378" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>

<!-- ONNX load arrow: registry → inference session -->
<path d="M160 424 L160 464 L380 464 L380 214 L406 214" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="5 3" opacity="0.4" marker-end="url(#arrow)"/>
<text class="ts" x="270" y="458" text-anchor="middle" opacity="0.55">load .onnx</text>

<!-- Fallback back-arrow to L3 -->
<path d="M520 424 L520 470 L630 470 L630 44 L502 44" fill="none" stroke="var(--t)" stroke-width="1" stroke-dasharray="4 3" opacity="0.3" marker-end="url(#arrow)"/>

<!-- Output bus -->
<g class="node c-amber">
  <rect x="130" y="508" width="420" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="529" text-anchor="middle" dominant-baseline="central">ML inference output</text>
  <text class="ts" x="340" y="547" text-anchor="middle" dominant-baseline="central">feature labels + process tags + confidence</text>
</g>
<line x1="520" y1="424" x2="470" y2="506" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
<line x1="160" y1="424" x2="210" y2="506" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>

<!-- Layer 5 handoff -->
<g class="node c-teal">
  <rect x="180" y="594" width="320" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="614" text-anchor="middle" dominant-baseline="central">→ Layer 5 (reporting / feedback / API)</text>
</g>
<line x1="340" y1="560" x2="340" y2="592" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)" fill="none"/>
</svg>
</div>
<footer>Layer 4 — ML / Context-Aware Reasoning · CAD Pipeline</footer>
</body>
</html>
