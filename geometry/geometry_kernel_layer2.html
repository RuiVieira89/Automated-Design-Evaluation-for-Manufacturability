<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 2 — Geometry Kernel</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border: rgba(0,0,0,0.12);
    --font-sans: system-ui, -apple-system, sans-serif;

    /* ramp fills (light mode) */
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-600: #993C1D; --coral-800: #712B13;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --gray-50:   #F1EFE8; --gray-100:   #D3D1C7; --gray-600:   #5F5E5A; --gray-800:   #444441;
    --blue-50:   #E6F1FB; --blue-100:   #B5D4F4; --blue-600:   #185FA5; --blue-800:   #0C447C;
    --amber-50:  #FAEEDA; --amber-100:  #FAC775; --amber-600:  #854F0B; --amber-800:  #633806;
    --t: rgba(0,0,0,0.35);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border: rgba(255,255,255,0.1);
      --coral-50: #4A1B0C; --coral-100: #712B13; --coral-600: #F0997B; --coral-800: #F5C4B3;
      --purple-50: #26215C; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --gray-50:   #2C2C2A; --gray-100:   #444441; --gray-600:   #B4B2A9; --gray-800:   #D3D1C7;
      --blue-50:   #042C53; --blue-100:   #0C447C; --blue-600:   #85B7EB; --blue-800:   #B5D4F4;
      --amber-50:  #412402; --amber-100:  #633806; --amber-600:  #EF9F27; --amber-800:  #FAC775;
      --t: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
  }
  h2 {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 32px;
  }
  .card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 760px;
  }
  svg text { font-family: var(--font-sans); }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  .box { fill: var(--gray-50); stroke: var(--gray-100); }
  .arr { stroke: var(--t); fill: none; stroke-width: 1.5; }
  .leader { stroke: var(--t); fill: none; stroke-width: 0.5; stroke-dasharray: 4 3; }

  .c-coral  rect, .c-coral  circle { fill: var(--coral-50);  stroke: var(--coral-600); }
  .c-coral  .th { fill: var(--coral-800); }
  .c-coral  .ts { fill: var(--coral-600); }
  .c-purple rect, .c-purple circle { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple .th { fill: var(--purple-800); }
  .c-purple .ts { fill: var(--purple-600); }
  .c-gray   rect, .c-gray   circle { fill: var(--gray-50);   stroke: var(--gray-100); }
  .c-gray   .th { fill: var(--gray-800); }
  .c-gray   .ts { fill: var(--gray-600); }
  .c-blue   rect, .c-blue   circle { fill: var(--blue-50);   stroke: var(--blue-600); }
  .c-blue   .th { fill: var(--blue-800); }
  .c-blue   .ts { fill: var(--blue-600); }
  .c-amber  rect, .c-amber  circle { fill: var(--amber-50);  stroke: var(--amber-600); }
  .c-amber  .th { fill: var(--amber-800); }
  .c-amber  .ts { fill: var(--amber-600); }

  .node { cursor: default; }
  footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--color-text-secondary);
    opacity: 0.6;
  }
</style>
</head>
<body>
<h1>CAD Pipeline</h1>
<h2>Layer 2 — Geometry Kernel</h2>
<div class="card">
<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Layer 1 handoff (input) ── -->
<g class="node c-coral">
  <rect x="120" y="20" width="200" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="220" y="40" text-anchor="middle" dominant-baseline="central">B-Rep object</text>
  <text class="ts" x="220" y="58" text-anchor="middle" dominant-baseline="central">from pythonocc / OCCT</text>
</g>
<g class="node c-coral">

  <text class="ts" x="460" y="58" text-anchor="middle" dominant-baseline="central">from meshio / ifcOpenShell</text>
</g>
<text class="ts" x="340" y="44" text-anchor="middle" dominant-baseline="central" opacity="0.45">Layer 1 ↓</text>

<!-- ── Library row ── -->
<g class="node c-purple">

<g class="node c-purple">

  <text class="ts" x="443" y="163" text-anchor="middle" dominant-baseline="central">Mesh analysis</text>
</g>
<g class="node c-purple">
  <rect x="534" y="120" width="116" height="64" rx="8" stroke-width="0.5"/>
  <text class="th" x="592" y="143" text-anchor="middle" dominant-baseline="central">libigl</text>
  <text class="ts" x="592" y="163" text-anchor="middle" dominant-baseline="central">Diff. geometry</text>
</g>

<!-- Handoff → library arrows -->
<line x1="220" y1="68" x2="120" y2="118" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.4"/>
<line x1="220" y1="68" x2="245" y2="118" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.4"/>
<line x1="460" y1="68" x2="390" y2="118" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.4"/>
<line x1="460" y1="68" x2="510" y2="118" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.4"/>
<line x1="460" y1="68" x2="580" y2="118" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.4"/>

<!-- ── Capability cards ── -->
<!-- OCCT -->
<g class="node c-gray">
  <rect x="30" y="214" width="155" height="48" rx="6" stroke-width="0.5"/>
  <text class="th" x="107" y="232" text-anchor="middle" dominant-baseline="central">Topology queries</text>
  <text class="ts" x="107" y="250" text-anchor="middle" dominant-baseline="central">Face classification</text>
</g>
<g class="node c-gray">
  <rect x="30" y="272" width="155" height="48" rx="6" stroke-width="0.5"/>
  <text class="th" x="107" y="290" text-anchor="middle" dominant-baseline="central">Curvature analysis</text>

</g>
<g class="node c-gray">

  <text class="th" x="107" y="348" text-anchor="middle" dominant-baseline="central">Boolean ops</text>
  <text class="ts" x="107" y="366" text-anchor="middle" dominant-baseline="central">Union, intersect, cut</text>
</g>
<line x1="107" y1="184" x2="107" y2="212" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.35"/>

<g class="node c-gray">
  <rect x="198" y="214" width="155" height="48" rx="6" stroke-width="0.5"/>
  <text class="th" x="275" y="232" text-anchor="middle" dominant-baseline="central">Mesh repair</text>
  <text class="ts" x="275" y="250" text-anchor="middle" dominant-baseline="central">Holes, self-intersections</text>
</g>
<g class="node c-gray">
  <rect x="198" y="272" width="155" height="48" rx="6" stroke-width="0.5"/>

  <text class="ts" x="275" y="308" text-anchor="middle" dominant-baseline="central">Minkowski sums</text>

<g class="node c-gray">
  <rect x="198" y="330" width="155" height="48" rx="6" stroke-width="0.5"/>
  <text class="th" x="275" y="348" text-anchor="middle" dominant-baseline="central">Exact arithmetic</text>
  <text class="ts" x="275" y="366" text-anchor="middle" dominant-baseline="central">Robust predicates</text>
</g>
<line x1="275" y1="184" x2="275" y2="212" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.35"/>

<!-- trimesh / Open3D -->
<g class="node c-gray">
  <rect x="366" y="214" width="155" height="48" rx="6" stroke-width="0.5"/>
  <text class="th" x="443" y="232" text-anchor="middle" dominant-baseline="central">Wall thickness</text>

  <text class="th" x="443" y="348" text-anchor="middle" dominant-baseline="central">Volume / PCD</text>

</g>
<line x1="443" y1="184" x2="443" y2="212" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.35"/>

<!-- libigl -->
<g class="node c-gray">
  <rect x="534" y="214" width="116" height="48" rx="6" stroke-width="0.5"/>
  <text class="th" x="592" y="232" text-anchor="middle" dominant-baseline="central">Sharp features</text>
  <text class="ts" x="592" y="250" text-anchor="middle" dominant-baseline="central">Dihedral angles</text>
</g>
<g class="node c-gray">
  <rect x="534" y="272" width="116" height="48" rx="6" stroke-width="0.5"/>

<!-- Cross-library interchange -->
<path d="M185 340 Q192 410 196 340" fill="none" stroke-width="1" stroke-dasharray="4 3" opacity="0.35" marker-end="url(#arrow)" style="stroke:var(--color-text-secondary)"/>

  <rect x="30" y="470" width="280" height="52" rx="8" stroke-width="0.5"/>

<line x1="107" y1="378" x2="140" y2="468" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.35"/>
<line x1="275" y1="378" x2="200" y2="468" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.35"/>
<line x1="443" y1="378" x2="460" y2="468" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.35"/>
<line x1="592" y1="378" x2="530" y2="468" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.35"/>

<!-- Layer 3 handoff -->
<g class="node c-amber">
  <rect x="160" y="570" width="360" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="590" text-anchor="middle" dominant-baseline="central">→ Layer 3 (feature extraction / analysis)</text>
  <text class="ts" x="340" y="608" text-anchor="middle" dominant-baseline="central">manufacturability, tolerancing, ML features</text>
</g>
<line x1="170" y1="522" x2="240" y2="568" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.4"/>
<line x1="510" y1="522" x2="440" y2="568" class="arr" marker-end="url(#arrow)" stroke-width="1" opacity="0.4"/>

<!-- Row labels -->
<text class="ts" x="14" y="44"  text-anchor="middle" opacity="0.4" transform="rotate(-90,14,44)">L1 out</text>
<text class="ts" x="14" y="152" text-anchor="middle" opacity="0.4" transform="rotate(-90,14,152)">libraries</text>
<text class="ts" x="14" y="302" text-anchor="middle" opacity="0.4" transform="rotate(-90,14,302)">capabilities</text>
<text class="ts" x="14" y="496" text-anchor="middle" opacity="0.4" transform="rotate(-90,14,496)">outputs</text>

</div>
<footer>Layer 2 — Geometry Kernel · CAD Pipeline</footer>
</body>
</html>
